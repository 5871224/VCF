name: Apply VCF defense cleanup fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-vcf-defense-fix.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix candidate cleanup after splice
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("eval/Evaluator.js")
          text = path.read_text(encoding="utf-8")
          old = '''\t\t\t\t\tfor (i = i - 1; i >= 0; i--) {
\t\t\t\t\t\tarr[clone[i]] = INVERT_COLOR[color];
\t\t\t\t\t\tisVCF(color, arr, winMoves) && clone.splice(i, 1);
\t\t\t\t\t\tarr[clone[i]] = 0;
\t\t\t\t\t}'''
          new = '''\t\t\t\t\tfor (i = i - 1; i >= 0; i--) {
\t\t\t\t\t\tconst testIdx = clone[i];
\t\t\t\t\t\tarr[testIdx] = INVERT_COLOR[color];
\t\t\t\t\t\tisVCF(color, arr, winMoves) && clone.splice(i, 1);
\t\t\t\t\t\tarr[testIdx] = 0;
\t\t\t\t\t}'''
          if text.count(old) != 1:
              raise SystemExit(f"expected one matching block, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          Path(".github/workflows/apply-vcf-defense-fix.yml").unlink()
          PY

      - name: Commit fix and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eval/Evaluator.js .github/workflows/apply-vcf-defense-fix.yml
          git commit -m "Fix VCF defense candidate cleanup"
          git push
