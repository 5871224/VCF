name: Deploy VCF to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  RAPFI_REF: 3aedf3a2ab0ab710a9f3d00e57d5287ceb864894
  RAPFI_NETWORKS_REF: 918b757a129258e9e765f77fe17d507c2bb1a60b
  EMSDK_VERSION: 3.1.74

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Restore official Rapfi Wasm cache
        id: rapfi-cache
        uses: actions/cache@v4
        with:
          path: .cache/rapfi-wasm
          key: rapfi-official-single-simd128-${{ runner.os }}-${{ env.RAPFI_REF }}-${{ env.RAPFI_NETWORKS_REF }}-${{ env.EMSDK_VERSION }}-v1

      - name: Restore independent VCF pattern engine cache
        id: pattern-cache
        uses: actions/cache@v4
        with:
          path: .cache/vcf-pattern-engine
          key: vcf-pattern-engine-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ hashFiles('rapfi/vcf-pattern-engine.cpp') }}

      - name: Restore Bitboard VCF engine cache
        id: bitboard-cache
        uses: actions/cache@v4
        with:
          path: .cache/vcf-bitboard-engine
          key: vcf-bitboard-engine-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ hashFiles('rapfi/vcf-pattern-engine.cpp', 'rapfi/vcf-bitboard-engine.cpp', 'rapfi/vcf-bitboard-legacy-extra.cpp') }}

      - name: Install Emscripten SDK
        if: steps.rapfi-cache.outputs.cache-hit != 'true' || steps.pattern-cache.outputs.cache-hit != 'true' || steps.bitboard-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .build/emsdk
          mkdir -p .build
          git clone --depth 1 --branch "$EMSDK_VERSION" https://github.com/emscripten-core/emsdk.git .build/emsdk
          .build/emsdk/emsdk install "$EMSDK_VERSION"
          .build/emsdk/emsdk activate "$EMSDK_VERSION"

      - name: Build official Rapfi single-thread WebAssembly
        if: steps.rapfi-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          source .build/emsdk/emsdk_env.sh
          rm -rf .build/rapfi .cache/rapfi-wasm
          mkdir -p .build .cache/rapfi-wasm

          git clone --filter=blob:none --no-checkout https://github.com/dhbloo/rapfi.git .build/rapfi
          git -C .build/rapfi fetch --depth 1 origin "$RAPFI_REF"
          git -C .build/rapfi checkout --detach "$RAPFI_REF"
          rm -rf .build/rapfi/Networks

          git clone --filter=blob:none --no-checkout https://github.com/dhbloo/rapfi-networks.git .build/rapfi/Networks
          git -C .build/rapfi/Networks sparse-checkout init --no-cone
          git -C .build/rapfi/Networks sparse-checkout set --no-cone \
            /wasm_preloads.txt /config-example/ /classical/ /mix9svq/
          git -C .build/rapfi/Networks fetch --depth 1 origin "$RAPFI_NETWORKS_REF"
          git -C .build/rapfi/Networks checkout --detach "$RAPFI_NETWORKS_REF"

          # 不修改 Rapfi 或 Networks 的任何原始碼、CMakeLists 或設定檔。
          build_dir="$GITHUB_WORKSPACE/.build/rapfi/Rapfi/build/wasm-single-simd128"
          mkdir -p "$build_dir"
          cd "$build_dir"
          emcmake cmake ../.. \
            -DCMAKE_BUILD_TYPE=Release \
            -DNO_COMMAND_MODULES=ON \
            -DNO_MULTI_THREADING=ON \
            -DUSE_WASM_SIMD=ON \
            -DUSE_WASM_SIMD_RELAXED=OFF
          emmake cmake --build . -j2

          cp rapfi-single-simd128.js rapfi-single-simd128.wasm rapfi-single-simd128.data \
            "$GITHUB_WORKSPACE/.cache/rapfi-wasm/"
          test -s "$GITHUB_WORKSPACE/.cache/rapfi-wasm/rapfi-single-simd128.js"
          test -s "$GITHUB_WORKSPACE/.cache/rapfi-wasm/rapfi-single-simd128.wasm"
          test -s "$GITHUB_WORKSPACE/.cache/rapfi-wasm/rapfi-single-simd128.data"

      - name: Test and build independent VCF pattern engine WebAssembly
        if: steps.pattern-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          source .build/emsdk/emsdk_env.sh
          rm -rf .cache/vcf-pattern-engine
          mkdir -p .cache/vcf-pattern-engine

          g++ rapfi/vcf-pattern-engine.cpp \
            -O2 \
            -std=c++17 \
            -DVCF_PATTERN_TEST_MAIN \
            -o /tmp/vcf-pattern-engine-test
          /tmp/vcf-pattern-engine-test

          em++ rapfi/vcf-pattern-engine.cpp \
            -O3 \
            -std=c++17 \
            -msimd128 \
            --no-entry \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=VCFPatternEngine \
            -s ENVIRONMENT=worker \
            -s FILESYSTEM=0 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s "EXPORTED_FUNCTIONS=['_vcfAnalyzePoint','_vcfLookupBenchmark','_vcfPatternSelfTest','_malloc','_free']" \
            -s "EXPORTED_RUNTIME_METHODS=['cwrap']" \
            -o .cache/vcf-pattern-engine/vcf-pattern-engine.js

          test -s .cache/vcf-pattern-engine/vcf-pattern-engine.js
          test -s .cache/vcf-pattern-engine/vcf-pattern-engine.wasm

      - name: Test and build Bitboard VCF WebAssembly
        if: steps.bitboard-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          source .build/emsdk/emsdk_env.sh
          rm -rf .cache/vcf-bitboard-engine
          mkdir -p .cache/vcf-bitboard-engine

          # 搜尋核心與棋型核心以獨立 VCF 原始碼連結；不包含 Rapfi 原始碼。
          g++ rapfi/vcf-pattern-engine.cpp rapfi/vcf-bitboard-engine.cpp rapfi/vcf-bitboard-legacy-extra.cpp \
            -O2 \
            -std=c++17 \
            -DVCF_BITBOARD_TEST_MAIN \
            -o /tmp/vcf-bitboard-engine-test
          /tmp/vcf-bitboard-engine-test

          em++ rapfi/vcf-pattern-engine.cpp rapfi/vcf-bitboard-engine.cpp rapfi/vcf-bitboard-legacy-extra.cpp \
            -O3 \
            -std=c++17 \
            -msimd128 \
            --no-entry \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=VCFBitboardModule \
            -s ENVIRONMENT='web,worker,node' \
            -s FILESYSTEM=0 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s "EXPORTED_FUNCTIONS=['_vcfBbFind','_vcfBbValidateRoute','_vcfBbRouteDefense','_vcfBbScanPoints','_vcfBbLegacyGetLevelPoint','_vcfBbLegacyTestLineFour','_vcfBbLegacyGetBlockFourPoint','_vcfBbLegacyIsFoul','_vcfBbLegacyGetLevelPointCompat','_vcfBbLegacyTestLineFourCompat','_vcfBbSelfTest','_malloc','_free']" \
            -s "EXPORTED_RUNTIME_METHODS=['cwrap']" \
            -o .cache/vcf-bitboard-engine/vcf-bitboard-engine.js

          test -s .cache/vcf-bitboard-engine/vcf-bitboard-engine.js
          test -s .cache/vcf-bitboard-engine/vcf-bitboard-engine.wasm
          node - <<'NODE'
          const path = require("path");
          const createModule = require(path.resolve(".cache/vcf-bitboard-engine/vcf-bitboard-engine.js"));
          createModule({
            locateFile: file => path.resolve(".cache/vcf-bitboard-engine", file),
          }).then(module => {
            const selfTest = module.cwrap("vcfBbSelfTest", "number", []);
            const result = selfTest();
            if (result !== 0) throw new Error(`Wasm self-test failed: ${result}`);
            console.log("Bitboard Wasm runtime self-test: 0");
          }).catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
          ls -lh .cache/vcf-bitboard-engine

      - name: Prepare static site
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf _site
          mkdir -p _site
          cp makevcf.html _site/index.html
          cp makevcf.html _site/makevcf.html
          cp makevcf-generator.html _site/
          cp makevcf-generator-*.js _site/
          cp makevcf-mobile.js makevcf-layout.js makevcf-optimized-search-v2.js _site/
          cp pattern-compare.js pattern-compare.html _site/
          cp README.md 規格書.MD 題目產生器規格.MD _site/
          cp -R eval emoji bitboard rapfi _site/
          mkdir -p _site/rapfi/engine
          cp .cache/rapfi-wasm/rapfi-single-simd128.* _site/rapfi/engine/
          cp .cache/vcf-pattern-engine/vcf-pattern-engine.* _site/rapfi/engine/
          cp .cache/vcf-bitboard-engine/vcf-bitboard-engine.* _site/rapfi/engine/

          # 舊 Rapfi／棋型比較頁保留為實驗室；/rapfi/ 改成完整 Bitboard 工作台。
          mv _site/rapfi/index.html _site/rapfi/lab.html
          cp makevcf.html _site/rapfi/index.html

          python - <<'PY'
          from pathlib import Path

          root_scripts = '''
          <!-- 手機棋盤自適應 -->
          <script src="makevcf-mobile.js"></script>
          <!-- VCF 題目產生器：與主分析頁共用同一棋盤 -->
          <script src="emoji/emoji.js"></script>
          <script src="eval/EvaluatorJScript.js"></script>
          <script src="eval/EvaluatorCore.js"></script>
          <script src="eval/Evaluator.js"></script>
          <script src="makevcf-generator-core.js"></script>
          <script src="makevcf-generator-base.js"></script>
          <script src="makevcf-generator-layer.js"></script>
          <script src="makevcf-generator-validate.js"></script>
          <script src="makevcf-generator-integrated.js"></script>
          <script src="makevcf-generator-reuse-bonus.js"></script>
          <script src="makevcf-generator-concentration.js"></script>
          <script src="makevcf-generator-main.js"></script>
          <script src="makevcf-generator-order-mode.js"></script>
          <script src="makevcf-generator-balance.js"></script>
          <script src="makevcf-generator-unique.js"></script>
          <script src="makevcf-generator-summary.js"></script>
          <!-- 卡片化介面 -->
          <script src="makevcf-layout.js"></script>
          <!-- 獨立的優化 VCF 搜尋與速度比較 -->
          <script src="makevcf-optimized-search-v2.js"></script>
          '''

          for filename in ("index.html", "makevcf.html"):
              path = Path("_site") / filename
              text = path.read_text(encoding="utf-8")
              if "makevcf-generator-integrated.js" not in text:
                  text = text.replace("</body>", root_scripts + "\n</body>")
              path.write_text(text, encoding="utf-8")

          rapfi_path = Path("_site/rapfi/index.html")
          rapfi_text = rapfi_path.read_text(encoding="utf-8")
          rapfi_text = rapfi_text.replace("<head>", '<head>\n<base href="../">', 1)
          bridge = '''
          <!-- 在舊頁面程式建立引擎前，先注入 Bitboard C++ Wasm 相容層。 -->
          <script src="rapfi/engine/vcf-bitboard-engine.js"></script>
          <script src="rapfi/vcf-bitboard-main.js"></script>
          '''
          rapfi_text = rapfi_text.replace("<script>", bridge + "\n<script>", 1)
          rapfi_scripts = '''
          <!-- 手機介面與原主頁題目產生器；棋型／搜尋介面由 Bitboard Wasm 提供。 -->
          <script src="makevcf-mobile.js"></script>
          <script src="emoji/emoji.js"></script>
          <script src="rapfi/vcf-bitboard-generator-compat.js"></script>
          <script src="makevcf-generator-core.js"></script>
          <script src="makevcf-generator-base.js"></script>
          <script src="makevcf-generator-layer.js"></script>
          <script src="makevcf-generator-validate.js"></script>
          <script src="makevcf-generator-integrated.js"></script>
          <script src="makevcf-generator-reuse-bonus.js"></script>
          <script src="makevcf-generator-concentration.js"></script>
          <script src="makevcf-generator-main.js"></script>
          <script src="makevcf-generator-order-mode.js"></script>
          <script src="makevcf-generator-balance.js"></script>
          <script src="makevcf-generator-unique.js"></script>
          <script src="makevcf-generator-summary.js"></script>
          <script src="makevcf-layout.js"></script>
          <script src="rapfi/rapfi-bitboard-dashboard.js"></script>
          '''
          rapfi_text = rapfi_text.replace("</body>", rapfi_scripts + "\n</body>")
          rapfi_path.write_text(rapfi_text, encoding="utf-8")

          assert 'base href="../"' in rapfi_text
          assert 'vcf-bitboard-engine.js' in rapfi_text
          assert 'vcf-bitboard-main.js' in rapfi_text
          assert 'vcf-bitboard-generator-compat.js' in rapfi_text
          assert 'eval/EvaluatorCore.js' not in rapfi_scripts
          assert Path("_site/rapfi/lab.html").is_file()
          PY

          touch _site/.nojekyll
          du -sh _site
          ls -lh _site/rapfi/engine
          grep -n "vcf-bitboard-main\|makevcf-generator-core\|rapfi-bitboard-dashboard" _site/rapfi/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
