name: VCF Generator CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'makevcf-generator-*.js'
      - 'rapfi/vcf-bitboard-generator-compat.js'
      - 'rapfi/vcf-bitboard-worker.js'
      - 'AGENTS.md'
      - '新版Bitboard VCF規格.MD'
      - '題目產生器規格.MD'
      - '.github/workflows/vcf-generator-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generator-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check generator JavaScript syntax
        shell: bash
        run: |
          set -euxo pipefail
          for file in makevcf-generator-*.js rapfi/vcf-bitboard-generator-compat.js rapfi/vcf-bitboard-worker.js; do
            node --check "$file"
          done

      - name: Verify dedicated Bitboard generator worker
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const vm = require('vm');

          const calls = [];
          class WorkerMock {
            constructor(url) {
              this.url = String(url);
              this.onmessage = null;
              this.onerror = null;
            }
            postMessage(message) {
              calls.push(message);
              let result = true;
              if (message.type === 'findVCF') {
                result = { winMoves: [[1, 2, 3]], nodeCount: 3, aborted: false };
              } else if (message.type === 'getBlockVCF') {
                result = { points: [4, 5], nodeCount: 2 };
              } else if (message.type === 'trimVCFGroups') {
                result = message.data.groups;
              }
              queueMicrotask(() => this.onmessage?.({
                data: { id: message.id, ok: true, result },
              }));
            }
            terminate() {}
          }

          const source = fs.readFileSync('makevcf-generator-core.js', 'utf8') +
            '\n;globalThis.__generatorTest = { genEngine };';
          const context = {
            console,
            URL,
            Worker: WorkerMock,
            Map,
            Array,
            Number,
            Error,
            queueMicrotask,
            setTimeout,
            document: {
              baseURI: 'https://example.test/VCF/',
              getElementById() { return null; },
              querySelector() { return null; },
              querySelectorAll() { return []; },
            },
            window: {
              engineAPI: {
                send() { throw new Error('generator must use its dedicated worker'); },
                cancel() { throw new Error('generator must not cancel main engine'); },
              },
            },
          };
          context.globalThis = context;
          vm.createContext(context);
          vm.runInContext(source, context, { filename: 'makevcf-generator-core.js' });

          (async () => {
            const engine = context.__generatorTest.genEngine;
            await engine.ready;
            if (engine.backend !== 'bitboard-generator-worker') {
              throw new Error(`unexpected generator backend: ${engine.backend}`);
            }
            if (!engine.worker || !engine.worker.url.endsWith('/rapfi/vcf-bitboard-worker.js')) {
              throw new Error(`unexpected worker URL: ${engine.worker && engine.worker.url}`);
            }
            const initCall = calls.find(call => call.type === 'init');
            if (!initCall?.data?.moduleURL?.endsWith('/rapfi/engine/vcf-bitboard-engine.js')) {
              throw new Error(`unexpected module URL: ${initCall?.data?.moduleURL}`);
            }

            const result = await engine.findVCF(new Array(226).fill(0), 1, 64, {
              mode: 'shortest',
              pruning: 'fast',
              maxDepth: 11,
              maxNode: 5000000,
            });
            if (!result?.winMoves?.length) throw new Error('Bitboard result was not returned');
            const findCall = calls.filter(call => call.type === 'findVCF').at(-1);
            if (!findCall || findCall.data.mode !== 'shortest' || findCall.data.pruning !== 'strict') {
              throw new Error(`unexpected generator search mode: ${JSON.stringify(findCall?.data)}`);
            }
            if (findCall.data.maxVCF !== 64 || findCall.data.maxDepth !== 11) {
              throw new Error('generator validation limits were not forwarded');
            }

            const points = await engine.getBlockVCF(new Array(226).fill(0), 1, [1, 2, 3], true);
            if (points.join(',') !== '4,5') throw new Error('getBlockVCF response was not normalized');
            console.log('Generator Bitboard worker contract test passed');
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Verify generator search policy
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('makevcf-generator-unique.js', 'utf8');
          const required = [
            'mode: "shortest"',
            'pruning: "strict"',
            'targets[0]?.moves || null',
            'const GEN_UNIQUE_MAX_GROUPS = 64',
            'mode: "multi"',
            'Boolean(info.aborted)',
          ];
          for (const token of required) {
            if (!source.includes(token)) throw new Error(`missing generator policy: ${token}`);
          }
          console.log('Generator shortest/strict and unique/multi policy checks passed');
          NODE
