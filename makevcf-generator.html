<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store">
<title>VCF 題目產生器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  background: #f0e8d0;
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  color: #2d281e;
}
h1 { font-size: 20px; }
.panel {
  width: min(100%, 760px);
  padding: 10px;
  border: 1px solid #cdbb84;
  border-radius: 7px;
  background: #fffdf5;
  box-shadow: 0 2px 8px #0001;
}
.controls { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: center; justify-content: center; }
fieldset { border: 0; display: flex; gap: 10px; align-items: center; }
legend { display: inline; font-weight: 700; margin-right: 4px; }
label { cursor: pointer; white-space: nowrap; }
input[type="number"] {
  width: 68px;
  padding: 5px 7px;
  border: 1px solid #aaa;
  border-radius: 4px;
  font-size: 14px;
  text-align: center;
}
button {
  padding: 8px 14px;
  border: 1px solid #aaa;
  border-radius: 4px;
  background: #fff;
  font-size: 14px;
  cursor: pointer;
}
button:hover { background: #e8f0ff; }
button:disabled { opacity: .45; cursor: default; }
#board-svg {
  width: min(94vw, 520px);
  height: min(94vw, 520px);
  background: #dcb97a;
  border-radius: 4px;
  box-shadow: 0 2px 8px #0003;
  display: block;
}
#status {
  min-height: 32px;
  padding: 7px 10px;
  border: 1px solid #c8b870;
  border-radius: 4px;
  background: #fffbe6;
  text-align: center;
  font-size: 13px;
  line-height: 1.35;
}
.badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 999px;
  background: #e9e0c4;
  font-size: 12px;
}
.legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 14px; margin-top: 7px; }
.legend-item { display: inline-flex; align-items: center; gap: 5px; }
.legend-mark { width: 14px; height: 14px; border-radius: 2px; display: inline-block; }
.legend-both { background: #2e9f45; border: 2px solid #176729; }
.legend-black { background: #222; border: 2px solid #d02020; }
.legend-white { background: #f8f8f8; border: 2px solid #d02020; }
a { color: #174ea6; }
</style>
</head>
<body>
<h1>VCF 題目產生器 <span class="badge">指定步數版</span></h1>

<div class="panel controls">
  <fieldset>
    <legend>攻方</legend>
    <label><input type="radio" name="attacker" value="1" checked> 黑</label>
    <label><input type="radio" name="attacker" value="2"> 白</label>
  </fieldset>
  <fieldset>
    <legend>規則</legend>
    <label><input type="radio" name="rules" value="2" checked> 有禁手</label>
    <label><input type="radio" name="rules" value="1"> 無禁手</label>
  </fieldset>
  <label>生成步數 <input id="target-steps" type="number" min="1" max="10" step="1" value="2"> 步</label>
  <label title="0% 不加權；100% 時每沿用一顆攻子，該候選相對未加成候選提高到 100 倍權重">沿用攻子每顆加成 <input id="bonus-reuse" type="number" min="0" max="100" step="1" value="10">%</label>
  <label title="綜合朝向天元與四顆攻子平均位置距離；100% 且綜合分數滿分時提高到 100 倍權重">朝天元綜合加成 <input id="bonus-center" type="number" min="0" max="100" step="1" value="15">%</label>
</div>

<svg id="board-svg" aria-label="15×15 棋盤"></svg>

<div class="panel">
  <div class="controls">
    <button id="btn-generate">產生 2 步 VCF</button>
    <button id="btn-stop" disabled>停止</button>
    <button id="btn-answer" disabled>顯示答案</button>
    <button id="btn-npoints" disabled>顯示 N 點</button>
    <a href="makevcf.html">回分析工具</a>
  </div>
  <div id="status">引擎初始化中……</div>
  <div id="details"></div>
  <div class="legend">
    <span class="legend-item"><span class="legend-mark legend-both"></span>雙方 N 點</span>
    <span class="legend-item"><span class="legend-mark legend-black"></span>黑方 N 點</span>
    <span class="legend-item"><span class="legend-mark legend-white"></span>白方 N 點</span>
  </div>
</div>

<script src="emoji/emoji.js"></script>
<script src="eval/EvaluatorJScript.js"></script>
<script src="eval/EvaluatorCore.js"></script>
<script src="eval/Evaluator.js"></script>
<script src="makevcf-generator-core.js"></script>
<script src="makevcf-generator-board.js"></script>
<script src="makevcf-generator-base.js"></script>
<script src="makevcf-generator-layer.js"></script>
<script src="makevcf-generator-validate.js"></script>
<script src="makevcf-generator-main.js"></script>
<script src="makevcf-generator-balance.js"></script>
<script src="makevcf-generator-unique.js"></script>
<script src="makevcf-generator-summary.js"></script>
</body>
</html>
