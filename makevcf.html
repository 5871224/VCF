<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store">
<title>制作VCF</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f0e8d0;
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  display: flex; flex-direction: column; align-items: center;
  padding: 12px; gap: 10px; min-height: 100vh;
}
svg { background: #dcb97a; border-radius: 4px; box-shadow: 0 2px 8px #0003; display: block; cursor: crosshair; touch-action: none; }
#btns { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
button {
  padding: 8px 14px; font-size: 14px;
  border: 1px solid #aaa; border-radius: 4px;
  background: #fff; cursor: pointer;
}
button:hover { background: #e8f0ff; }
button:active { background: #c8d8ff; }
button:disabled { opacity: 0.45; cursor: default; }
#rule-box { display: flex; gap: 14px; font-size: 14px; }
#rule-box label { cursor: pointer; }
#analysis-box { display: flex; gap: 14px; font-size: 14px; align-items: center; }
#analysis-box label { cursor: pointer; }
#btns2 { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
#status {
  font-size: 13px; color: #333;
  background: #fffbe6; border: 1px solid #c8b870;
  border-radius: 4px; padding: 5px 10px;
  min-width: 220px; text-align: center;
}
#import-panel {
  width: min(100%, 1120px);
  background: #fffdf5;
  border: 1px solid #d8c48a;
  border-radius: 6px;
  padding: 10px;
  box-shadow: 0 2px 8px #0001;
}
#import-toolbar, #import-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 8px;
}
#import-status {
  font-size: 13px;
  color: #5a4820;
  background: #fff7d1;
  border: 1px solid #e2d08b;
  border-radius: 4px;
  padding: 6px 10px;
  text-align: center;
  margin-bottom: 8px;
}
#import-canvases {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 10px;
}
.canvas-card {
  background: #fff;
  border: 1px solid #e1d7b6;
  border-radius: 6px;
  padding: 8px;
}
.canvas-card h3 {
  font-size: 14px;
  margin-bottom: 6px;
  color: #4a3a1a;
}
.canvas-card p {
  font-size: 12px;
  color: #7a6942;
  margin-bottom: 6px;
  min-height: 18px;
}
.import-canvas {
  width: 100%;
  background: #f3f3f3;
  border-radius: 4px;
  border: 1px solid #ddd;
  display: block;
  touch-action: none;
}
.hint {
  font-size: 12px;
  color: #7a6942;
}
.danger-lite {
  color: #a0462a !important;
}
</style>
</head>
<body>

<svg id="board-svg"></svg>

<div id="rule-box">
  <label><input type="radio" name="rules" value="2" checked> 有禁手</label>
  <label><input type="radio" name="rules" value="1"> 無禁手</label>
</div>
<div id="btns">
  <button id="btn-black">黑子VCF</button>
  <button id="btn-white">白子VCF</button>
  <button id="btn-stop" disabled>暫停</button>
  <button id="btn-continue">繼續</button>
  <button id="btn-clear-vcf">清除路線/分析</button>
  <button id="btn-clear">清空棋盤</button>
</div>
<div id="analysis-box">
  分析色：
  <label><input type="radio" name="acolor" value="1" checked> 黑</label>
  <label><input type="radio" name="acolor" value="2"> 白</label>
</div>
<div id="btns2">
  <button id="btn-block-vcf" disabled>VCF防守</button>
  <button id="btn-block-vcf-all">全部VCF防守</button>
  <button id="btn-multi-vcf">多組VCF</button>
  <button id="btn-vcf-prev" disabled>上一組</button>
  <button id="btn-vcf-next" disabled>下一組</button>
  <button id="btn-level3">VCT點</button>
  <button id="btn-add-black">補黑找VCF</button>
  <button id="btn-add-white">補白找VCF</button>
</div>
<div id="status">引擎初始化中...</div>

<div id="import-panel">
  <div id="import-toolbar">
    <button id="btn-import-image">匯入圖片</button>
    <button id="btn-import-camera">手機拍照</button>
    <button id="btn-import-redetect" disabled>重新偵測棋盤</button>
    <button id="btn-import-confirm" disabled>確認棋盤區域</button>
    <button id="btn-import-apply" disabled>套用到棋盤</button>
    <button id="btn-import-reset" disabled>重設匯入</button>
  </div>
  <div id="import-status">匯入圖片後，可自動抓棋盤範圍；若不準，可拖曳四角修正，再確認並套用。</div>
  <div id="import-canvases">
    <div class="canvas-card">
      <h3>原圖與棋盤框</h3>
      <p id="source-hint">支援上傳、貼上截圖、手機拍照；可拖曳四角點修正棋盤區域。</p>
      <canvas id="source-canvas" class="import-canvas" width="520" height="520"></canvas>
    </div>
    <div class="canvas-card">
      <h3>校正後棋盤與辨識預覽</h3>
      <p id="warped-hint">會顯示透視校正後的棋盤、15x15 交點，以及黑白空辨識結果。</p>
      <canvas id="warped-canvas" class="import-canvas" width="520" height="520"></canvas>
      <div class="hint">預覽中：黑子為深色圓、白子為淺色圓、低信心點會加紅框。</div>
    </div>
  </div>
  <div id="import-actions" class="hint">
    桌機可直接 Ctrl+V 貼上截圖；手機可用拍照。若自動偵測失敗，仍可手動拖曳四角完成匯入。
  </div>
  <input id="image-file-input" type="file" accept="image/*" hidden>
  <input id="camera-file-input" type="file" accept="image/*" capture="environment" hidden>
</div>

<script>
"use strict";

// ── WebView2 bridge：建立與 Electron preload 相同介面的 window.engineAPI ──
if (!window.engineAPI && window.chrome?.webview) {
  const pending = new Map();
  let nextId = 1;
  window.chrome.webview.addEventListener('message', e => {
    const msg = JSON.parse(e.data);
    console.log('[←wv2]', 'id='+msg.id, JSON.stringify(msg.result).slice(0,200));
    const res = pending.get(msg.id);
    if (res) { pending.delete(msg.id); res(msg.result); }
  });
  function wv2call(type, cmd, param) {
    return new Promise(resolve => {
      const id = nextId++;
      pending.set(id, resolve);
      const msg = JSON.stringify({ id, type, cmd, param: param ?? null });
      let extra = '';
      if (param?.arr) {
        const stones = param.arr.slice(0,225).reduce((a,v)=>a+(v>0?1:0),0);
        extra = ` [棋子數:${stones} color:${param.color}]`;
      }
      console.log('[wv2→]', type, cmd + extra);
      window.chrome.webview.postMessage(msg);
    });
  }
  window.engineAPI = {
    workerCount:        window._vcf_workerCount || 4,
    send:               (cmd, param) => wv2call('engine', cmd, param),
    cancel:             ()           => wv2call('engine', 'cancel', null),
    poolGetLevelPoints: (param)      => wv2call('pool', 'getLevelPoints', param),
    poolCancel:         ()           => wv2call('pool', 'cancel', null),
    poolSetRules:       (rules)      => wv2call('pool', 'setRules', { rules }),
  };
}

// ============================================================
// VCF Engine — directly wraps eval/worker.js
// ============================================================
class VCFEngine {
  constructor() {
    this._rules = 2;
    this._w = null;
    this._res = null;
    this._initP = this._start();
  }

  async _start() {
    if (window.engineAPI) {
      await window.engineAPI.send('setGameRules', { rules: this._rules });
      return;
    }
    if (this._w) { this._w.terminate(); this._w = null; }
    try {
      this._w = new Worker("eval/worker.js");
    } catch(e) {
      throw new Error("Worker 建立失敗，請確認在 HTTP 伺服器環境執行（不能用 file://）");
    }
    this._w.onmessage = e => {
      if (e.data.cmd === "resolve" && this._res) {
        const r = this._res; this._res = null; r(e.data.param);
      }
    };
    this._w.onerror = e => {
      console.error("Worker error:", e);
      if (this._res) { const r = this._res; this._res = null; r(null); }
    };
    await this._post("setGameRules", { rules: this._rules });
  }

  _post(cmd, param) {
    if (window.engineAPI) return window.engineAPI.send(cmd, param);
    return new Promise(resolve => { this._res = resolve; this._w.postMessage({ cmd, param }); });
  }

  async findVCF({ arr, color, maxVCF = 1, maxDepth = 200, maxNode = 5000000 }) {
    await this._initP;
    return (await this._post("findVCF", { arr, color, maxVCF, maxDepth, maxNode })) || { winMoves: [] };
  }

  async getBlockVCF({ arr, color, vcfMoves }) {
    await this._initP;
    return await this._post("getBlockVCF", { arr, color, vcfMoves, includeFour: true });
  }

  async getLevelPoints({ arr, color, placeColor, maxDepth = 200, maxNode = 5000000 }) {
    await this._initP;
    return await this._post("getLevelPoints", { arr, color, placeColor, maxDepth, maxNode });
  }

  async trimVCFGroups({ arr, groups, color }) {
    await this._initP;
    return await this._post("trimVCFGroups", { arr, groups, color });
  }

  async setRules(rules) {
    this._rules = rules;
    if (window.engineAPI) { this._initP = this._start(); await this._initP; return; }
    if (this._res) { const r = this._res; this._res = null; r(null); }
    this._initP = this._start();
    await this._initP;
  }

  async cancel() {
    if (window.engineAPI) {
      await window.engineAPI.cancel();
      this._initP = this._start();
      await this._initP;
      return;
    }
    if (this._res) { const r = this._res; this._res = null; r(null); }
    this._initP = this._start();
    await this._initP;
  }
}

// ============================================================
// Worker Pool — parallel getLevelPoints across multiple workers
// ============================================================
class WorkerPool {
  constructor() {
    this._n = window.engineAPI
      ? window.engineAPI.workerCount
      : Math.max(1, Math.min(navigator.hardwareConcurrency || 4, 8));
    this._workers = [];
    this._rules = 2;
    this._cancelFn = null;
    this._initP = this._init();
  }

  async _init() {
    if (window.engineAPI) {
      await window.engineAPI.poolSetRules(this._rules);
      return;
    }
    this._workers.forEach(w => w.terminate());
    this._workers = [];
    const inits = [];
    for (let i = 0; i < this._n; i++) {
      const w = new Worker("eval/worker.js");
      this._workers.push(w);
      inits.push(new Promise((resolve, reject) => {
        w.onmessage = e => { if (e.data.cmd === "resolve") resolve(); };
        w.onerror = e => reject(new Error("Pool worker 初始化失敗"));
        w.postMessage({ cmd: "setGameRules", param: { rules: this._rules } });
      }));
    }
    await Promise.all(inits);
  }

  get workerCount() { return this._n; }

  async setRules(rules) {
    this._rules = rules;
    this._initP = this._init();
    await this._initP;
  }

  async cancel() {
    if (window.engineAPI) {
      await window.engineAPI.poolCancel();
      this._initP = this._init();
      await this._initP;
      return;
    }
    if (this._cancelFn) { this._cancelFn(); this._cancelFn = null; }
    this._workers.forEach(w => w.terminate());
    this._workers = [];
    this._initP = this._init();
    await this._initP;
  }

  async getLevelPoints({ arr, color, placeColor, indices, maxDepth = 200, maxNode = 5000000 }) {
    await this._initP;
    if (window.engineAPI) {
      return window.engineAPI.poolGetLevelPoints(
        { arr: Array.from(arr), color, placeColor, indices, maxDepth, maxNode }
      );
    }
    const emptyIdx = indices
      ? indices.filter(i => arr[i] === 0)
      : Array.from({length: 225}, (_, i) => i).filter(i => arr[i] === 0);
    const chunks = Array.from({length: this._n}, () => []);
    emptyIdx.forEach((idx, i) => chunks[i % this._n].push(idx));

    const cancelRace = new Promise(resolve => { this._cancelFn = () => resolve(null); });
    const empty = {items: [], nodeCount: 0};
    const workerWork = Promise.all(this._workers.map((w, i) => {
      if (!chunks[i].length) return Promise.resolve(empty);
      return new Promise((resolve, reject) => {
        w.onmessage = e => { if (e.data.cmd === "resolve") resolve(e.data.param || empty); };
        w.onerror = reject;
        w.postMessage({ cmd: "getLevelPoints", param: { arr, color, placeColor, indices: chunks[i], maxDepth, maxNode } });
      });
    })).then(all => ({
      items: all.flatMap(r => r.items || []),
      nodeCount: all.reduce((sum, r) => sum + (r.nodeCount || 0), 0)
    }));

    const result = await Promise.race([workerWork, cancelRace]);
    this._cancelFn = null;
    return result;
  }
}

const engine = new VCFEngine();
const pool = new WorkerPool();
engine._initP
  .then(() => setStatus("就緒，點擊棋盤交替落子，再點計算"))
  .catch(e => setStatus("⚠ " + e.message));

// ============================================================
// Board SVG
// ============================================================
(function() {
  const SIZE = 15, CELL = 34, PAD = 22;
  const PX = PAD * 2 + CELL * (SIZE - 1);
  const STARS = [3, 7, 11];
  const NS = "http://www.w3.org/2000/svg";

  function el(tag, attrs, parent) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
    if (parent) parent.appendChild(e);
    return e;
  }

  const svg = document.getElementById("board-svg");
  svg.setAttribute("viewBox", `0 0 ${PX} ${PX}`);
  svg.setAttribute("width", PX);
  svg.setAttribute("height", PX);

  // Grid
  for (let i = 0; i < SIZE; i++) {
    const p = PAD + i * CELL;
    el("line", {x1:p,y1:PAD,x2:p,y2:PAD+(SIZE-1)*CELL,stroke:"#333","stroke-width":"1"}, svg);
    el("line", {x1:PAD,y1:p,x2:PAD+(SIZE-1)*CELL,y2:p,stroke:"#333","stroke-width":"1"}, svg);
  }
  for (const r of STARS) for (const c of STARS)
    el("circle", {cx:PAD+c*CELL,cy:PAD+r*CELL,r:3,fill:"#333"}, svg);

  // Stone layer (placed stones)
  const stoneLayer = el("g", {}, svg);

  // VCF overlay layer (on top, non-interactive)
  const vcfLayer = el("g", {"pointer-events":"none"}, svg);

  // Analysis dots layer (above vcfLayer)
  const analysisLayer = el("g", {"pointer-events":"none"}, svg);

  const board = new Array(225).fill(0);
  const stoneEls = new Array(225).fill(null);
  let nextColor = 1;

  function pos(idx) {
    return { cx: PAD + (idx % SIZE) * CELL, cy: PAD + Math.floor(idx / SIZE) * CELL };
  }

  function drawStone(idx) {
    if (stoneEls[idx]) { stoneEls[idx].remove(); stoneEls[idx] = null; }
    if (!board[idx]) return;
    const { cx, cy } = pos(idx);
    const g = el("g", {}, stoneLayer);
    el("circle", {cx, cy, r: CELL*0.46,
      fill: board[idx]===1?"#111":"#f5f5f5",
      stroke: board[idx]===1?"#000":"#555", "stroke-width":"1"}, g);
    stoneEls[idx] = g;
  }

  function svgXY(e) {
    const rect = svg.getBoundingClientRect();
    const scX = PX / rect.width, scY = PX / rect.height;
    const col = Math.round(((e.clientX - rect.left)*scX - PAD) / CELL);
    const row = Math.round(((e.clientY - rect.top)*scY - PAD) / CELL);
    if (col < 0 || col >= SIZE || row < 0 || row >= SIZE) return -1;
    return row * SIZE + col;
  }

  svg.addEventListener("contextmenu", e => e.preventDefault());
  function saveBoard() {
    try { localStorage.setItem("vcf_board", JSON.stringify({b: Array.from(board), nc: nextColor})); } catch(e) {}
  }

  svg.addEventListener("click", e => {
    const idx = svgXY(e);
    if (idx < 0) return;
    if (board[idx]) { nextColor = board[idx]; board[idx] = 0; }
    else { board[idx] = nextColor; nextColor = nextColor === 1 ? 2 : 1; }
    drawStone(idx);
    saveBoard();
  });

  // 還原上次盤面
  try {
    const saved = JSON.parse(localStorage.getItem("vcf_board") || "null");
    if (saved && Array.isArray(saved.b) && saved.b.length === 225) {
      for (let i = 0; i < 225; i++) board[i] = saved.b[i] || 0;
      nextColor = saved.nc === 2 ? 2 : 1;
      for (let i = 0; i < 225; i++) drawStone(i);
    }
  } catch(e) {}

  window._getArr = () => {
    const a = new Array(226).fill(0); a[225] = -1;
    for (let i = 0; i < 225; i++) a[i] = board[i];
    return a;
  };

  window._setBoardArr = (arr, next = 1) => {
    for (let i = 0; i < 225; i++) {
      board[i] = arr[i] || 0;
      drawStone(i);
    }
    nextColor = next === 2 ? 2 : 1;
    saveBoard();
  };

  window._clearBoard = () => {
    for (let i = 0; i < 225; i++) {
      board[i] = 0;
      if (stoneEls[i]) { stoneEls[i].remove(); stoneEls[i] = null; }
    }
    nextColor = 1;
    window._clearVCF();
    window._clearAnalysis();
    try { localStorage.removeItem("vcf_board"); } catch(e) {}
  };

  // ---- Analysis dots overlay ----
  window._clearAnalysis = () => {
    while (analysisLayer.firstChild) analysisLayer.firstChild.remove();
  };

  // items: [{idx, label}]，在每個位置畫小圓＋文字標籤
  window._showAnalysisLabels = (items, bgColor, textColor) => {
    window._clearAnalysis();
    // bgColor 可以是字串或 (item) => color 函式
    const colorFn = typeof bgColor === "function" ? bgColor : () => bgColor;
    const NS2 = "http://www.w3.org/2000/svg";
    for (const item of items) {
      const {idx, label} = item;
      if (idx < 0 || idx >= 225) continue;
      const { cx, cy } = pos(idx);
      const g = el("g", {}, analysisLayer);
      el("circle", {cx, cy, r: CELL * 0.32, fill: colorFn(item), opacity: "0.88"}, g);
      const t = document.createElementNS(NS2, "text");
      t.setAttribute("x", cx);
      t.setAttribute("y", cy);
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("dominant-baseline", "central");
      t.setAttribute("font-size", CELL * 0.26);
      t.setAttribute("font-weight", "bold");
      t.setAttribute("fill", textColor || "#fff");
      t.textContent = String(label);
      g.appendChild(t);
    }
  };

  // idxList: array of board indices
  // 在已有標籤上疊加外圈（不清除，直接疊上去）
  window._showAnalysisRing = (idxList, strokeColor) => {
    for (const idx of idxList) {
      if (idx >= 0 && idx < 225) {
        const { cx, cy } = pos(idx);
        el("circle", {cx, cy, r: CELL*0.40, fill:"none", stroke: strokeColor, "stroke-width":"2.5"}, analysisLayer);
      }
    }
  };

  window._showAnalysisTriangles = (idxList, fillColor) => {
    const r = CELL * 0.33;
    for (const idx of idxList) {
      if (idx >= 0 && idx < 225) {
        const { cx, cy } = pos(idx);
        const pts = `${cx},${cy - r} ${cx - r * 0.866},${cy + r * 0.5} ${cx + r * 0.866},${cy + r * 0.5}`;
        el("polygon", {points: pts, fill: fillColor, opacity: "0.9"}, analysisLayer);
      }
    }
  };

  window._showAnalysisMarkers = (idxList, markerColor) => {
    window._clearAnalysis();
    for (const idx of idxList) {
      if (idx >= 0 && idx < 225) {
        const { cx, cy } = pos(idx);
        const r = CELL * 0.2;
        el("line", {x1:cx-r,y1:cy-r,x2:cx+r,y2:cy+r,stroke:markerColor,"stroke-width":"2.5"}, analysisLayer);
        el("line", {x1:cx+r,y1:cy-r,x2:cx-r,y2:cy+r,stroke:markerColor,"stroke-width":"2.5"}, analysisLayer);
      }
    }
  };

  // ---- VCF overlay on main board ----
  window._clearVCF = () => {
    while (vcfLayer.firstChild) vcfLayer.firstChild.remove();
  };

  window._showVCF = (moves, firstColor) => {
    window._clearVCF();
    for (let i = 0; i < moves.length; i++) {
      const idx = moves[i];
      const color = i % 2 === 0 ? firstColor : (firstColor === 1 ? 2 : 1);
      const { cx, cy } = pos(idx);
      const g = el("g", {}, vcfLayer);
      // Stone with orange ring to distinguish from placed stones
      el("circle", {cx, cy, r: CELL*0.46,
        fill: color===1?"#222":"#f0f0f0",
        stroke: "#e07000", "stroke-width":"2.5"}, g);
      const t = document.createElementNS(NS, "text");
      t.setAttribute("x", cx); t.setAttribute("y", cy);
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("dominant-baseline", "central");
      t.setAttribute("font-size", CELL * 0.38);
      t.setAttribute("font-weight", "bold");
      t.setAttribute("fill", color===1?"#fff":"#000");
      t.textContent = i + 1;
      g.appendChild(t);
    }
  };
})();

// ============================================================
// Buttons
// ============================================================
function setStatus(s) { document.getElementById("status").textContent = s; }
function elapsed(t0) { return `${((performance.now() - t0) / 1000).toFixed(6)}s`; }
function fmtNodes(n) { return n >= 1e6 ? `${(n/1e6).toFixed(1)}M nodes` : n >= 1000 ? `${(n/1000).toFixed(0)}K nodes` : `${n} nodes`; }
function fmtRate(nodes, t0) {
  const sec = (performance.now() - t0) / 1000;
  if (sec <= 0) return "0 nodes/s";
  const rate = nodes / sec;
  return rate >= 1e6 ? `${(rate / 1e6).toFixed(2)}M nodes/s`
    : rate >= 1000 ? `${(rate / 1000).toFixed(1)}K nodes/s`
    : `${Math.round(rate)} nodes/s`;
}

let searching = false;
let lastParam = null;
let lastVCFMoves = null;
let vcfGroups = null;
let vcfGroupIdx = 0;
let vcfGroupColor = 1;

function setVcfGroup(idx) {
  vcfGroupIdx = idx;
  lastVCFMoves = vcfGroups[idx];
  window._showVCF(lastVCFMoves, vcfGroupColor);
  document.getElementById("btn-block-vcf").disabled = false;
  document.getElementById("btn-vcf-prev").disabled = idx === 0;
  document.getElementById("btn-vcf-next").disabled = idx === vcfGroups.length - 1;
  const cName = vcfGroupColor===1 ? "黑" : "白";
  setStatus(`${cName} 第 ${idx+1}/${vcfGroups.length} 組 VCF，${lastVCFMoves.length} 手`);
}

function resetVcfGroups() {
  vcfGroups = null;
  vcfGroupIdx = 0;
  document.getElementById("btn-vcf-prev").disabled = true;
  document.getElementById("btn-vcf-next").disabled = true;
}
function getAColor() { return parseInt(document.querySelector('input[name="acolor"]:checked').value); }

function setBusy(v) {
  searching = v;
  document.querySelectorAll('input[name="rules"]').forEach(r => r.disabled = v);
  document.querySelectorAll('input[name="acolor"]').forEach(r => r.disabled = v);
  ["btn-black","btn-white","btn-continue","btn-level3","btn-add-black","btn-add-white","btn-block-vcf-all","btn-multi-vcf"].forEach(id => document.getElementById(id).disabled = v);
  document.getElementById("btn-block-vcf").disabled = v || !lastVCFMoves;
  document.getElementById("btn-vcf-prev").disabled = v || !vcfGroups || vcfGroupIdx === 0;
  document.getElementById("btn-vcf-next").disabled = v || !vcfGroups || vcfGroupIdx === vcfGroups.length - 1;
  document.getElementById("btn-stop").disabled = !v;
}

async function doSearch(arr, color) {
  lastParam = { arr, color };
  setBusy(true);
  window._clearVCF();
  window._clearAnalysis();
  resetVcfGroups();
  setStatus(`正在搜索 ${color===1?"黑子":"白子"} VCF...`);
  try {
    const t0 = performance.now();
    const info = await engine.findVCF({ arr, color, maxVCF: 1, maxDepth: 200, maxNode: 5000000 });
    if (info && info.winMoves && info.winMoves[0] && info.winMoves[0].length) {
      lastVCFMoves = info.winMoves[0];
      window._showVCF(info.winMoves[0], color);
      setStatus(`${color===1?"黑子":"白子"} VCF 找到，共 ${info.winMoves[0].length} 手（${elapsed(t0)}，${fmtNodes(info.nodeCount)}，${fmtRate(info.nodeCount, t0)}）`);
    } else {
      setStatus(`${color===1?"黑子":"白子"} VCF 未找到（${elapsed(t0)}，${fmtNodes(info.nodeCount)}，${fmtRate(info.nodeCount, t0)}）`);
    }
  } catch(e) {
    console.error(e);
    setStatus("搜索失敗：" + (e && e.message || String(e)));
  }
  setBusy(false);
}

document.getElementById("btn-multi-vcf").addEventListener("click", async () => {
  const arr = window._getArr();
  if (!arr.slice(0,225).some(v => v > 0)) { setStatus("請先擺好棋型"); return; }
  const color = getAColor();
  const cName = color===1 ? "黑" : "白";
  setBusy(true);
  window._clearVCF();
  window._clearAnalysis();
  const t0 = performance.now();
  try {
    setStatus(`搜索 ${cName} 多組 VCF...`);
    const info = await engine.findVCF({ arr, color, maxVCF: 20, maxDepth: 200, maxNode: 5000000 });
    if (!info || !info.winMoves || !info.winMoves[0] || !info.winMoves[0].length) {
      setStatus(`${cName} VCF 未找到（${elapsed(t0)}，${fmtNodes(info.nodeCount)}，${fmtRate(info.nodeCount, t0)}）`);
      return;
    }
    const rawGroups = info.winMoves.filter(m => m && m.length);
    setStatus(`後處理：修剪活四尾步並去重...`);
    const groups = await engine.trimVCFGroups({ arr, groups: rawGroups, color });
    if (!groups) return;
    if (!groups.length) {
      setStatus(`${cName} VCF 後處理後無結果（${elapsed(t0)}，${fmtNodes(info.nodeCount)}，${fmtRate(info.nodeCount, t0)}）`);
      return;
    }
    vcfGroups = groups;
    vcfGroupColor = color;

    // 顯示第 0 組路線，並啟用導航按鈕
    setVcfGroup(0);

    // 每個唯一起點
    const firstMoveSet = new Set(groups.map(moves => moves[0]));
    const uniqueStarts = firstMoveSet.size;
    const trimNote = rawGroups.length !== groups.length ? `，原 ${rawGroups.length} 組→修剪後 ${groups.length} 組` : `，共 ${groups.length} 組`;
    setStatus(`${cName} VCF：${uniqueStarts} 個起點，最短 ${groups[0].length} 手${trimNote}（${elapsed(t0)}，${fmtNodes(info.nodeCount)}，${fmtRate(info.nodeCount, t0)}）`);
  } finally {
    setBusy(false);
  }
});

document.getElementById("btn-block-vcf-all").addEventListener("click", async () => {
  const arr = window._getArr();
  if (!arr.slice(0,225).some(v => v > 0)) { setStatus("請先擺好棋型"); return; }
  const color = getAColor();
  const cName = color===1 ? "黑" : "白";
  const oppColor = 3 - color;
  setBusy(true);
  const t0 = performance.now();
  try {
    setStatus(`檢查 ${cName} 是否有 VCF...`);
    const vcfResult = await engine.findVCF({ arr, color, maxVCF: 1, maxDepth: 200, maxNode: 5000000 });
    if (!vcfResult) return;
    if (!vcfResult.winMoves || !vcfResult.winMoves[0] || !vcfResult.winMoves[0].length) {
      window._clearAnalysis();
      setStatus(`${cName} 無 VCF，不需防守（${elapsed(t0)}）`);
      return;
    }
    lastVCFMoves = vcfResult.winMoves[0];
    document.getElementById("btn-block-vcf").disabled = false;

    setStatus(`取得 ${cName} VCF 防守候選點...`);
    const candidates = await engine.getBlockVCF({ arr, color, vcfMoves: lastVCFMoves });
    if (!candidates) return;
    if (!candidates.length) {
      window._clearAnalysis();
      setStatus(`${cName} 未找到 VCF 防守候選點（${elapsed(t0)}）`);
      return;
    }

    setStatus(`驗證 ${candidates.length} 個候選點（${pool.workerCount} 核並行）...`);
    const data = await pool.getLevelPoints({ arr, color, placeColor: oppColor, indices: candidates, maxDepth: 200, maxNode: 5000000 });
    if (!data) return;
    const stillVCF = new Set(data.items.map(r => r.idx));
    const confirmed = candidates.filter(idx => !stillVCF.has(idx));

    window._clearAnalysis();
    if (confirmed.length) {
      window._showAnalysisTriangles(confirmed, "#4488ff");
      setStatus(`${cName} 全部VCF防守：${confirmed.length} 個有效防守點（${elapsed(t0)}，${fmtNodes(data.nodeCount)}，${fmtRate(data.nodeCount, t0)}）`);
    } else {
      setStatus(`${cName} 無有效防守點（${elapsed(t0)}，${fmtNodes(data.nodeCount)}，${fmtRate(data.nodeCount, t0)}）`);
    }
  } finally {
    setBusy(false);
  }
});

function lerpColor(hex1, hex2, t) {
  const p = s => parseInt(s, 16);
  const r = Math.round(p(hex1.slice(1,3)) + (p(hex2.slice(1,3)) - p(hex1.slice(1,3))) * t);
  const g = Math.round(p(hex1.slice(3,5)) + (p(hex2.slice(3,5)) - p(hex1.slice(3,5))) * t);
  const b = Math.round(p(hex1.slice(5,7)) + (p(hex2.slice(5,7)) - p(hex1.slice(5,7))) * t);
  return `rgb(${r},${g},${b})`;
}

async function doAddVCF(arr, placeColor) {
  const color = getAColor();
  const placeName = placeColor===1 ? "黑" : "白";
  const vcfName   = color===1 ? "黑" : "白";
  const lightColor = "#7799ee";
  const darkColor  = "#001188";
  setBusy(true);
  window._clearAnalysis();
  try {
    setStatus(`補${placeName}逐點試下，找${vcfName} VCF（${pool.workerCount} 核並行）...`);
    const t0 = performance.now();
    const data = await pool.getLevelPoints({ arr, color, placeColor });
    if (!data) return;
    const { items: result, nodeCount } = data;
    if (result.length) {
      const vcfLabels = result.filter(r => r.label !== "4" && r.label !== "5").map(r => Number(r.label));
      const minL = vcfLabels.length ? Math.min(...vcfLabels) : 0;
      const maxL = vcfLabels.length ? Math.max(...vcfLabels) : 0;
      window._showAnalysisLabels(result, item => {
        if (item.label === "5") return "#ff66aa";
        if (item.label === "4") return "#c05000";
        const t = maxL === minL ? 1 : (Number(item.label) - minL) / (maxL - minL);
        return lerpColor(lightColor, darkColor, t);
      }, "#fff");
      if (vcfLabels.length) {
        const ringIdx = result.filter(r => r.label !== "4" && r.label !== "5" && Number(r.label) === maxL).map(r => r.idx);
        window._showAnalysisRing(ringIdx, "#00ccff");
      }
      const n5 = result.filter(r => r.label === "5").length;
      const n4 = result.filter(r => r.label === "4").length;
      const nV = result.length - n5 - n4;
      const s5 = n5 ? `連五 ${n5} 個，` : "";
      setStatus(`補${placeName}找${vcfName} VCF：${s5}四 ${n4} 個，VCF ${nV} 個（${elapsed(t0)}，${fmtNodes(nodeCount)}，${fmtRate(nodeCount, t0)}）`);
    } else { window._clearAnalysis(); setStatus(`補${placeName}找${vcfName} VCF：無結果（${elapsed(t0)}，${fmtNodes(nodeCount)}，${fmtRate(nodeCount, t0)}）`); }
  } finally {
    setBusy(false);
  }
}

// Image import / board recognition
// ============================================================
(function() {
  const SIZE = 15;
  const WARP_SIZE = 900;
  const SOURCE_MAX = 1200;
  const sourceCanvas = document.getElementById("source-canvas");
  const warpedCanvas = document.getElementById("warped-canvas");
  const srcCtx = sourceCanvas.getContext("2d");
  const warpCtx = warpedCanvas.getContext("2d");
  const imageFileInput = document.getElementById("image-file-input");
  const cameraFileInput = document.getElementById("camera-file-input");
  const importStatusEl = document.getElementById("import-status");
  const sourceHintEl = document.getElementById("source-hint");
  const warpedHintEl = document.getElementById("warped-hint");
  const btnImportImage = document.getElementById("btn-import-image");
  const btnImportCamera = document.getElementById("btn-import-camera");
  const btnImportRedetect = document.getElementById("btn-import-redetect");
  const btnImportConfirm = document.getElementById("btn-import-confirm");
  const btnImportApply = document.getElementById("btn-import-apply");
  const btnImportReset = document.getElementById("btn-import-reset");

  const importState = {
    mode: "idle",
    cvReady: false,
    sourceImage: null,
    displayScale: 1,
    sourceRect: null,
    boardCorners: [],
    dragCorner: -1,
    warpedIntersections: [],
    recognizedBoard: new Array(225).fill(0),
    confidenceMap: new Array(225).fill(0),
    classificationMeta: [],
  };

  function setImportStatus(text, danger = false) {
    importStatusEl.textContent = text;
    importStatusEl.classList.toggle("danger-lite", !!danger);
  }

  function setImportButtons() {
    const hasImage = !!importState.sourceImage;
    const hasCorners = importState.boardCorners.length === 4;
    const boardConfirmed = importState.mode === "boardConfirmed" || importState.mode === "recognized";
    btnImportRedetect.disabled = !hasImage;
    btnImportReset.disabled = !hasImage;
    btnImportConfirm.disabled = !hasCorners;
    btnImportApply.disabled = !boardConfirmed;
  }

  function resetWarpedView() {
    warpCtx.clearRect(0, 0, warpedCanvas.width, warpedCanvas.height);
    warpCtx.fillStyle = "#f3f3f3";
    warpCtx.fillRect(0, 0, warpedCanvas.width, warpedCanvas.height);
    warpCtx.fillStyle = "#7a6942";
    warpCtx.font = "16px system-ui";
    warpCtx.textAlign = "center";
    warpCtx.fillText("尚未產生校正後棋盤", warpedCanvas.width / 2, warpedCanvas.height / 2);
  }

  function resetImportState(keepCv = true) {
    importState.mode = "idle";
    importState.sourceImage = null;
    importState.displayScale = 1;
    importState.sourceRect = null;
    importState.boardCorners = [];
    importState.dragCorner = -1;
    importState.warpedIntersections = [];
    importState.recognizedBoard.fill(0);
    importState.confidenceMap.fill(0);
    importState.classificationMeta = [];
    if (!keepCv) importState.cvReady = false;
    srcCtx.clearRect(0, 0, sourceCanvas.width, sourceCanvas.height);
    srcCtx.fillStyle = "#f3f3f3";
    srcCtx.fillRect(0, 0, sourceCanvas.width, sourceCanvas.height);
    srcCtx.fillStyle = "#7a6942";
    srcCtx.font = "16px system-ui";
    srcCtx.textAlign = "center";
    srcCtx.fillText("請匯入圖片或貼上截圖", sourceCanvas.width / 2, sourceCanvas.height / 2);
    resetWarpedView();
    sourceHintEl.textContent = "支援上傳、貼上截圖、手機拍照；可拖曳四角點修正棋盤區域。";
    warpedHintEl.textContent = "會顯示透視校正後的棋盤、15x15 交點，以及黑白空辨識結果。";
    setImportStatus("匯入圖片後，可自動抓棋盤範圍；若不準，可拖曳四角修正，再確認並套用。");
    setImportButtons();
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const existing = Array.from(document.scripts).find(s => s.src === src);
      if (existing) {
        if (window.cv?.Mat) { resolve(); return; }
        existing.addEventListener("load", resolve, { once: true });
        existing.addEventListener("error", reject, { once: true });
        return;
      }
      const script = document.createElement("script");
      script.src = src;
      script.async = true;
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }

  async function ensureCvReady() {
    if (importState.cvReady && window.cv?.Mat) return true;
    try {
      if (!window.cv) {
        await loadScript("https://docs.opencv.org/4.13.0/opencv.js");
      }
      if (window.cv?.Mat) {
        importState.cvReady = true;
        return true;
      }
      await new Promise((resolve, reject) => {
        const started = performance.now();
        const timer = setInterval(() => {
          if (window.cv?.Mat) {
            clearInterval(timer);
            importState.cvReady = true;
            resolve();
          } else if (performance.now() - started > 12000) {
            clearInterval(timer);
            reject(new Error("OpenCV.js 載入逾時"));
          }
        }, 100);
      });
      return true;
    } catch (e) {
      console.error(e);
      setImportStatus("OpenCV.js 載入失敗，仍可手動框棋盤，但無法自動偵測。", true);
      return false;
    }
  }

  function getCanvasPoint(evt, canvas) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const touch = evt.touches ? evt.touches[0] : evt.changedTouches ? evt.changedTouches[0] : null;
    const clientX = touch ? touch.clientX : evt.clientX;
    const clientY = touch ? touch.clientY : evt.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  }

  function clamp(v, lo, hi) {
    return Math.max(lo, Math.min(hi, v));
  }

  function lerpPoint(a, b, t) {
    return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
  }

  function dist2(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return dx * dx + dy * dy;
  }

  function orderCorners(pts) {
    const sorted = pts.slice().sort((a, b) => a.y - b.y);
    const top = sorted.slice(0, 2).sort((a, b) => a.x - b.x);
    const bottom = sorted.slice(2).sort((a, b) => a.x - b.x);
    return [top[0], top[1], bottom[1], bottom[0]];
  }

  function drawSource() {
    srcCtx.clearRect(0, 0, sourceCanvas.width, sourceCanvas.height);
    srcCtx.fillStyle = "#f3f3f3";
    srcCtx.fillRect(0, 0, sourceCanvas.width, sourceCanvas.height);
    if (!importState.sourceImage) return;
    const img = importState.sourceImage;
    const fit = Math.min(sourceCanvas.width / img.width, sourceCanvas.height / img.height);
    const drawW = img.width * fit;
    const drawH = img.height * fit;
    const offX = (sourceCanvas.width - drawW) / 2;
    const offY = (sourceCanvas.height - drawH) / 2;
    importState.displayScale = fit;
    importState.sourceRect = { x: offX, y: offY, w: drawW, h: drawH };
    srcCtx.drawImage(img, offX, offY, drawW, drawH);

    if (importState.boardCorners.length === 4) {
      srcCtx.strokeStyle = "#1a73e8";
      srcCtx.lineWidth = 3;
      srcCtx.beginPath();
      srcCtx.moveTo(importState.boardCorners[0].x, importState.boardCorners[0].y);
      for (let i = 1; i < 4; i++) srcCtx.lineTo(importState.boardCorners[i].x, importState.boardCorners[i].y);
      srcCtx.closePath();
      srcCtx.stroke();
      srcCtx.setLineDash([5, 5]);
      srcCtx.strokeStyle = "#5b94f0";
      const gridStep = 1 / (SIZE - 1);
      for (let i = 1; i < SIZE - 1; i++) {
        const t = i * gridStep;
        const top = lerpPoint(importState.boardCorners[0], importState.boardCorners[1], t);
        const bottom = lerpPoint(importState.boardCorners[3], importState.boardCorners[2], t);
        const left = lerpPoint(importState.boardCorners[0], importState.boardCorners[3], t);
        const right = lerpPoint(importState.boardCorners[1], importState.boardCorners[2], t);
        srcCtx.beginPath();
        srcCtx.moveTo(top.x, top.y);
        srcCtx.lineTo(bottom.x, bottom.y);
        srcCtx.stroke();
        srcCtx.beginPath();
        srcCtx.moveTo(left.x, left.y);
        srcCtx.lineTo(right.x, right.y);
        srcCtx.stroke();
      }
      srcCtx.setLineDash([]);
      importState.boardCorners.forEach((pt, idx) => {
        srcCtx.beginPath();
        srcCtx.fillStyle = idx === importState.dragCorner ? "#ff7043" : "#ffffff";
        srcCtx.strokeStyle = "#d84315";
        srcCtx.lineWidth = 2;
        srcCtx.arc(pt.x, pt.y, 9, 0, Math.PI * 2);
        srcCtx.fill();
        srcCtx.stroke();
        srcCtx.fillStyle = "#333";
        srcCtx.font = "12px system-ui";
        srcCtx.fillText(String(idx + 1), pt.x + 12, pt.y - 10);
      });
    }
  }

  async function normalizeImage(img) {
    const scale = Math.min(1, SOURCE_MAX / Math.max(img.width, img.height));
    if (scale === 1) return img;
    const canvas = document.createElement("canvas");
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
    const scaled = new Image();
    await new Promise((resolve, reject) => {
      scaled.onload = resolve;
      scaled.onerror = reject;
      scaled.src = canvas.toDataURL("image/png");
    });
    return scaled;
  }

  function projectImagePointToSourceCanvas(pt) {
    const rect = importState.sourceRect || { x: 0, y: 0, w: sourceCanvas.width, h: sourceCanvas.height };
    return { x: rect.x + pt.x * importState.displayScale, y: rect.y + pt.y * importState.displayScale };
  }

  function sourceCanvasPointToImage(pt) {
    const rect = importState.sourceRect;
    return {
      x: clamp((pt.x - rect.x) / importState.displayScale, 0, importState.sourceImage.width - 1),
      y: clamp((pt.y - rect.y) / importState.displayScale, 0, importState.sourceImage.height - 1),
    };
  }

  function setDefaultCorners() {
    if (!importState.sourceRect) drawSource();
    const r = importState.sourceRect;
    const marginX = r.w * 0.08;
    const marginY = r.h * 0.08;
    importState.boardCorners = [
      { x: r.x + marginX, y: r.y + marginY },
      { x: r.x + r.w - marginX, y: r.y + marginY },
      { x: r.x + r.w - marginX, y: r.y + r.h - marginY },
      { x: r.x + marginX, y: r.y + r.h - marginY },
    ];
    importState.mode = "cornersEditing";
    drawSource();
  }

  async function loadImageFromBlob(blob) {
    const img = new Image();
    img.decoding = "async";
    const url = URL.createObjectURL(blob);
    try {
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = url;
      });
      importState.sourceImage = await normalizeImage(img);
      importState.mode = "imageLoaded";
      importState.boardCorners = [];
      importState.recognizedBoard.fill(0);
      importState.confidenceMap.fill(0);
      importState.classificationMeta = [];
      drawSource();
      resetWarpedView();
      setImportStatus("圖片已載入，正在嘗試自動偵測棋盤區域...");
      sourceHintEl.textContent = "若棋盤框不準，可直接拖曳四個角點修正。";
      setImportButtons();
      await autoDetectBoard();
    } finally {
      URL.revokeObjectURL(url);
    }
  }

  async function autoDetectBoard() {
    drawSource();
    if (!importState.sourceImage) return;
    const cvAvailable = await ensureCvReady();
    if (!cvAvailable) {
      setDefaultCorners();
      setImportStatus("OpenCV.js 不可用，已切到手動框選模式。");
      setImportButtons();
      return;
    }
    let src = null, gray = null, blur = null, edges = null, contours = null, hierarchy = null;
    try {
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = importState.sourceImage.width;
      tempCanvas.height = importState.sourceImage.height;
      tempCanvas.getContext("2d").drawImage(importState.sourceImage, 0, 0);
      src = cv.imread(tempCanvas);
      gray = new cv.Mat();
      blur = new cv.Mat();
      edges = new cv.Mat();
      contours = new cv.MatVector();
      hierarchy = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
      cv.Canny(blur, edges, 50, 150);
      cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);
      let best = null;
      for (let i = 0; i < contours.size(); i++) {
        const contour = contours.get(i);
        const peri = cv.arcLength(contour, true);
        const approx = new cv.Mat();
        cv.approxPolyDP(contour, approx, 0.02 * peri, true);
        if (approx.rows === 4) {
          const area = Math.abs(cv.contourArea(approx));
          if (area > importState.sourceImage.width * importState.sourceImage.height * 0.12 && (!best || area > best.area)) {
            const pts = [];
            for (let j = 0; j < 4; j++) pts.push({ x: approx.intPtr(j, 0)[0], y: approx.intPtr(j, 0)[1] });
            best = { area, pts: orderCorners(pts).map(projectImagePointToSourceCanvas) };
          }
        }
        approx.delete();
        contour.delete();
      }
      if (best) {
        importState.boardCorners = best.pts;
        importState.mode = "cornersEditing";
        setImportStatus("已自動偵測棋盤區域；若有偏差，可拖曳四角修正後再確認。");
      } else {
        setDefaultCorners();
        setImportStatus("自動偵測未命中，已提供預設棋盤框，請手動修正。", true);
      }
    } catch (e) {
      console.error(e);
      setDefaultCorners();
      setImportStatus("自動偵測失敗，已切到手動框選模式。", true);
    } finally {
      drawSource();
      setImportButtons();
      if (src) src.delete();
      if (gray) gray.delete();
      if (blur) blur.delete();
      if (edges) edges.delete();
      if (contours) contours.delete();
      if (hierarchy) hierarchy.delete();
    }
  }

  function pickCorner(pt) {
    let bestIdx = -1;
    let bestDist = 18 * 18;
    importState.boardCorners.forEach((corner, idx) => {
      const d = dist2(pt, corner);
      if (d < bestDist) {
        bestDist = d;
        bestIdx = idx;
      }
    });
    return bestIdx;
  }

  function beginCornerDrag(evt) {
    if (!importState.boardCorners.length) return;
    const idx = pickCorner(getCanvasPoint(evt, sourceCanvas));
    if (idx >= 0) {
      importState.dragCorner = idx;
      drawSource();
      evt.preventDefault();
    }
  }

  function moveCornerDrag(evt) {
    if (importState.dragCorner < 0) return;
    const pt = getCanvasPoint(evt, sourceCanvas);
    const r = importState.sourceRect;
    importState.boardCorners[importState.dragCorner] = {
      x: clamp(pt.x, r.x, r.x + r.w),
      y: clamp(pt.y, r.y, r.y + r.h),
    };
    drawSource();
    evt.preventDefault();
  }

  function endCornerDrag() {
    if (importState.dragCorner >= 0) {
      importState.dragCorner = -1;
      drawSource();
    }
  }

  function computeWarpedIntersections() {
    const coords = [];
    const span = WARP_SIZE - 1;
    for (let row = 0; row < SIZE; row++) {
      for (let col = 0; col < SIZE; col++) {
        coords.push({ x: (col / (SIZE - 1)) * span, y: (row / (SIZE - 1)) * span });
      }
    }
    importState.warpedIntersections = coords;
  }

  function samplePatch(data, width, height, cx, cy, innerR, outerR) {
    let sum = 0, count = 0, grad = 0, gradCount = 0, minLum = 255, maxLum = 0;
    for (let y = Math.max(0, Math.floor(cy - outerR)); y <= Math.min(height - 1, Math.ceil(cy + outerR)); y++) {
      for (let x = Math.max(0, Math.floor(cx - outerR)); x <= Math.min(width - 1, Math.ceil(cx + outerR)); x++) {
        const dx = x - cx;
        const dy = y - cy;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < innerR || d > outerR) continue;
        const idx = (y * width + x) * 4;
        const lum = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
        sum += lum;
        count++;
        if (lum < minLum) minLum = lum;
        if (lum > maxLum) maxLum = lum;
        if (x + 1 < width && y + 1 < height) {
          const idxX = (y * width + (x + 1)) * 4;
          const idxY = ((y + 1) * width + x) * 4;
          const lumX = 0.299 * data[idxX] + 0.587 * data[idxX + 1] + 0.114 * data[idxX + 2];
          const lumY = 0.299 * data[idxY] + 0.587 * data[idxY + 1] + 0.114 * data[idxY + 2];
          grad += Math.abs(lum - lumX) + Math.abs(lum - lumY);
          gradCount += 2;
        }
      }
    }
    return { mean: count ? sum / count : 0, contrast: maxLum - minLum, grad: gradCount ? grad / gradCount : 0, count };
  }

  function sampleLineVisibility(data, width, height, cx, cy, radius) {
    let hDark = 0, hCount = 0, vDark = 0, vCount = 0;
    const bgPatch = samplePatch(data, width, height, cx, cy, radius * 1.1, radius * 1.8);
    const bg = bgPatch.mean || 200;
    for (let dx = -radius; dx <= radius; dx++) {
      if (Math.abs(dx) <= radius * 0.28) continue;
      const x = clamp(Math.round(cx + dx), 0, width - 1);
      const y = clamp(Math.round(cy), 0, height - 1);
      const idx = (y * width + x) * 4;
      const lum = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
      if (lum < bg - 18) hDark++;
      hCount++;
    }
    for (let dy = -radius; dy <= radius; dy++) {
      if (Math.abs(dy) <= radius * 0.28) continue;
      const x = clamp(Math.round(cx), 0, width - 1);
      const y = clamp(Math.round(cy + dy), 0, height - 1);
      const idx = (y * width + x) * 4;
      const lum = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
      if (lum < bg - 18) vDark++;
      vCount++;
    }
    return { h: hCount ? hDark / hCount : 0, v: vCount ? vDark / vCount : 0, bg };
  }

  function renderRecognitionPreview() {
    const step = (WARP_SIZE - 1) / (SIZE - 1);
    warpCtx.lineWidth = 1;
    warpCtx.strokeStyle = "rgba(30, 90, 180, 0.35)";
    for (let i = 0; i < SIZE; i++) {
      const p = i * step;
      warpCtx.beginPath();
      warpCtx.moveTo(p, 0);
      warpCtx.lineTo(p, WARP_SIZE - 1);
      warpCtx.stroke();
      warpCtx.beginPath();
      warpCtx.moveTo(0, p);
      warpCtx.lineTo(WARP_SIZE - 1, p);
      warpCtx.stroke();
    }
    for (let idx = 0; idx < importState.warpedIntersections.length; idx++) {
      const pt = importState.warpedIntersections[idx];
      const stone = importState.recognizedBoard[idx];
      const conf = importState.confidenceMap[idx];
      warpCtx.beginPath();
      warpCtx.arc(pt.x, pt.y, step * 0.11, 0, Math.PI * 2);
      warpCtx.fillStyle = "rgba(20, 90, 200, 0.70)";
      warpCtx.fill();
      if (!stone) continue;
      warpCtx.beginPath();
      warpCtx.arc(pt.x, pt.y, step * 0.42, 0, Math.PI * 2);
      warpCtx.fillStyle = stone === 1 ? "rgba(18, 18, 18, 0.88)" : "rgba(248, 248, 248, 0.92)";
      warpCtx.strokeStyle = stone === 1 ? "rgba(0,0,0,0.9)" : "rgba(60,60,60,0.85)";
      warpCtx.lineWidth = 2;
      warpCtx.fill();
      warpCtx.stroke();
      if (conf < 0.65) {
        warpCtx.strokeStyle = "rgba(220, 60, 60, 0.95)";
        warpCtx.lineWidth = 3;
        warpCtx.strokeRect(pt.x - step * 0.46, pt.y - step * 0.46, step * 0.92, step * 0.92);
      }
    }
  }

  function recognizeBoard() {
    const imageData = warpCtx.getImageData(0, 0, warpedCanvas.width, warpedCanvas.height);
    const data = imageData.data;
    const width = warpedCanvas.width;
    const height = warpedCanvas.height;
    const step = (WARP_SIZE - 1) / (SIZE - 1);
    const centerRadius = step * 0.22;
    const ringInner = step * 0.32;
    const ringOuter = step * 0.52;
    const bgInner = step * 0.55;
    const bgOuter = step * 0.82;
    const meta = [];
    const occupied = [];
    for (let idx = 0; idx < importState.warpedIntersections.length; idx++) {
      const pt = importState.warpedIntersections[idx];
      const center = samplePatch(data, width, height, pt.x, pt.y, 0, centerRadius);
      const ring = samplePatch(data, width, height, pt.x, pt.y, ringInner, ringOuter);
      const bg = samplePatch(data, width, height, pt.x, pt.y, bgInner, bgOuter);
      const line = sampleLineVisibility(data, width, height, pt.x, pt.y, Math.round(step * 0.38));
      const delta = Math.abs(center.mean - bg.mean);
      const ringDelta = Math.abs(ring.mean - bg.mean);
      const lineScore = (line.h + line.v) / 2;
      const emptyLikelihood = lineScore * 0.65 + (delta < 18 ? 0.2 : 0) + (ringDelta < 16 ? 0.15 : 0);
      const occupiedScore = delta * 0.9 + ringDelta * 1.1 + ring.grad * 0.5 + center.contrast * 0.35 - lineScore * 38;
      meta[idx] = { pt, center, ring, bg, line, delta, ringDelta, emptyLikelihood, occupiedScore };
      if (emptyLikelihood < 0.62 || occupiedScore > 18) occupied.push(idx);
    }
    const occupiedLums = occupied.map(idx => meta[idx].ring.mean).sort((a, b) => a - b);
    const darkCut = occupiedLums.length ? occupiedLums[Math.floor(Math.max(0, occupiedLums.length * 0.38 - 1))] : 90;
    const brightCut = occupiedLums.length ? occupiedLums[Math.floor(Math.min(occupiedLums.length - 1, occupiedLums.length * 0.68))] : 170;
    importState.classificationMeta = meta;
    for (let idx = 0; idx < 225; idx++) {
      const m = meta[idx];
      let stone = 0;
      let confidence = 0.5;
      if (m.emptyLikelihood >= 0.62 && m.occupiedScore < 28) {
        stone = 0;
        confidence = clamp(0.55 + m.emptyLikelihood * 0.35 - m.delta / 80, 0, 1);
      } else if (m.ring.mean <= darkCut || m.center.mean < m.bg.mean - 28) {
        stone = 1;
        confidence = clamp(0.55 + (m.bg.mean - m.ring.mean) / 90 + m.occupiedScore / 80, 0, 1);
      } else {
        stone = 2;
        confidence = clamp(0.45 + Math.max(0, m.ring.mean - brightCut) / 90 + m.occupiedScore / 90, 0, 1);
      }
      importState.recognizedBoard[idx] = stone;
      importState.confidenceMap[idx] = confidence;
    }
    renderRecognitionPreview();
    importState.mode = "recognized";
    warpedHintEl.textContent = "已生成 15x15 交點與辨識預覽；紅框代表較低信心。";
    setImportButtons();
  }

  async function confirmBoardArea() {
    if (importState.boardCorners.length !== 4) return;
    const cvAvailable = await ensureCvReady();
    if (!cvAvailable) {
      setImportStatus("需要 OpenCV.js 才能做透視校正。", true);
      return;
    }
    let src = null, dst = null, srcTri = null, dstTri = null, matrix = null;
    try {
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = importState.sourceImage.width;
      tempCanvas.height = importState.sourceImage.height;
      tempCanvas.getContext("2d").drawImage(importState.sourceImage, 0, 0);
      src = cv.imread(tempCanvas);
      dst = new cv.Mat();
      const imageCorners = orderCorners(importState.boardCorners.map(sourceCanvasPointToImage));
      srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, imageCorners.flatMap(p => [p.x, p.y]));
      dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, WARP_SIZE - 1, 0, WARP_SIZE - 1, WARP_SIZE - 1, 0, WARP_SIZE - 1]);
      matrix = cv.getPerspectiveTransform(srcTri, dstTri);
      cv.warpPerspective(src, dst, matrix, new cv.Size(WARP_SIZE, WARP_SIZE), cv.INTER_LINEAR, cv.BORDER_REPLICATE);
      cv.imshow(warpedCanvas, dst);
      importState.mode = "boardConfirmed";
      computeWarpedIntersections();
      recognizeBoard();
      setImportStatus("棋盤已校正並完成第一輪辨識，可檢查結果後套用。");
    } catch (e) {
      console.error(e);
      setImportStatus("透視校正失敗，請再調整四角後重試。", true);
    } finally {
      if (src) src.delete();
      if (dst) dst.delete();
      if (srcTri) srcTri.delete();
      if (dstTri) dstTri.delete();
      if (matrix) matrix.delete();
    }
  }

  function detectNextColor(board) {
    let black = 0, white = 0;
    for (const v of board) {
      if (v === 1) black++;
      else if (v === 2) white++;
    }
    return black <= white ? 1 : 2;
  }

  function applyRecognizedBoard() {
    window._setBoardArr(importState.recognizedBoard, detectNextColor(importState.recognizedBoard));
    setStatus("已將圖片辨識結果套用到主棋盤，可直接繼續 VCF 分析。");
    setImportStatus("辨識結果已套用到主棋盤。若有少數誤差，可直接在棋盤上手動修正。");
  }

  async function loadFromFileList(files) {
    if (!files || !files[0]) return;
    await loadImageFromBlob(files[0]);
  }

  document.addEventListener("paste", async evt => {
    const items = Array.from(evt.clipboardData?.items || []);
    const imageItem = items.find(item => item.type.startsWith("image/"));
    if (!imageItem) return;
    evt.preventDefault();
    const blob = imageItem.getAsFile();
    if (blob) await loadImageFromBlob(blob);
  });

  btnImportImage.addEventListener("click", () => imageFileInput.click());
  btnImportCamera.addEventListener("click", () => cameraFileInput.click());
  btnImportReset.addEventListener("click", () => resetImportState(true));
  btnImportRedetect.addEventListener("click", () => autoDetectBoard());
  btnImportConfirm.addEventListener("click", () => confirmBoardArea());
  btnImportApply.addEventListener("click", () => applyRecognizedBoard());
  imageFileInput.addEventListener("change", async evt => {
    await loadFromFileList(evt.target.files);
    imageFileInput.value = "";
  });
  cameraFileInput.addEventListener("change", async evt => {
    await loadFromFileList(evt.target.files);
    cameraFileInput.value = "";
  });
  sourceCanvas.addEventListener("mousedown", beginCornerDrag);
  sourceCanvas.addEventListener("mousemove", moveCornerDrag);
  window.addEventListener("mouseup", endCornerDrag);
  sourceCanvas.addEventListener("mouseleave", endCornerDrag);
  sourceCanvas.addEventListener("touchstart", beginCornerDrag, { passive: false });
  sourceCanvas.addEventListener("touchmove", moveCornerDrag, { passive: false });
  sourceCanvas.addEventListener("touchend", endCornerDrag);
  sourceCanvas.addEventListener("touchcancel", endCornerDrag);

  resetImportState(false);
})();
</script>
</body>
</html>
